<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
  </head>
  <body>
    <div class="card">
      <div class="background">
        <svg
          version="1.1"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
          x="0px"
          y="0px"
          width="100%"
          height="100%"
          viewBox="0 0 1600 900"
        >
          <defs>
            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="50%" stop-color="#4BAEFE" stop-opacity="0.7" />
              <stop offset="65%" stop-color="#9035FF" stop-opacity="0.7" />
            </linearGradient>
            <path
              id="wave"
              fill="url(#bgGradient)"
              d="M-363.852,502.589c0,0,236.988-41.997,505.475,0
      s371.981,38.998,575.971,0s293.985-39.278,505.474,5.859s493.475,48.368,716.963-4.995v560.106H-363.852V502.589z"
            />
          </defs>
          <g>
            <use xlink:href="#wave" opacity=".4">
              <animateTransform
                attributeName="transform"
                attributeType="XML"
                type="translate"
                dur="8s"
                calcMode="spline"
                values="270 230; -334 180; 270 230"
                keyTimes="0; .5; 1"
                keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
                repeatCount="indefinite"
              />
            </use>
            <use xlink:href="#wave" opacity=".6">
              <animateTransform
                attributeName="transform"
                attributeType="XML"
                type="translate"
                dur="6s"
                calcMode="spline"
                values="-270 230;243 220;-270 230"
                keyTimes="0; .6; 1"
                keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
                repeatCount="indefinite"
              />
            </use>
            <use xlink:href="#wave" opacty=".9">
              <animateTransform
                attributeName="transform"
                attributeType="XML"
                type="translate"
                dur="4s"
                calcMode="spline"
                values="0 230;-140 200;0 230"
                keyTimes="0; .4; 1"
                keySplines="0.42, 0, 0.58, 1.0;0.42, 0, 0.58, 1.0"
                repeatCount="indefinite"
              />
            </use>
          </g>
        </svg>
      </div>
      <img src="logo.svg" class="logo" />
      <div class="toggle login-active">
        <button type="button" onclick="toggleView('login')">
          <span> Login </span>
        </button>
        <button type="button" onclick="toggleView('register')">
          <span> Sign Up</span>
        </button>
      </div>
      <div class="forms">
        <form class="form login active">
          <div class="textbox">
            <img src="email.svg" />
            <input required type="text" autocomplete="off" />
            <label>Email</label>
          </div>
          <div class="textbox">
            <img src="password.svg" />
            <input required type="password" />
            <label>Password</label>
          </div>
          <a>Forgot password?</a>
          <button type="submit">
            <p>Login</p>
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </form>
        <form class="form register">
          <div class="textbox">
            <img src="person.svg" />
            <input required type="text" autocomplete="off" />
            <label>Name</label>
          </div>
          <div class="textbox">
            <img src="email.svg" />
            <input required type="text" autocomplete="off" />
            <label>Email</label>
          </div>
          <div class="textbox">
            <img src="password.svg" />
            <input required type="password" />
            <label>Password</label>
          </div>
          <button type="submit">
            <p>Sign Up</p>
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </form>
      </div>
      <p class="footer">
        By using this software program you agree to our
        <a>privacy policy</a> and <a>terms of use</a>.
      </p>
    </div>
    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
