<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Accordion</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,1,0"
    />
  </head>
  <body>
    <div class="image-accordion">
      <div
        class="image-accordion-item active"
        data-image="https://images.pexels.com/photos/17034836/pexels-photo-17034836.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
      >
        <img
          src="https://images.pexels.com/photos/17034836/pexels-photo-17034836.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
          alt="Santorini, Greece"
        />
        <div class="content">
          <div>
            <h2>Santorini</h2>
            <p>Greece</p>
          </div>
          <button class="add-btn" type="button">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>
      </div>
      <div
        class="image-accordion-item"
        data-image="https://images.pexels.com/photos/35236407/pexels-photo-35236407.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
      >
        <img
          src="https://images.pexels.com/photos/35236407/pexels-photo-35236407.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
          alt="Maldives"
        />
        <div class="content">
          <div>
            <h2>Maldives</h2>
            <p>Indian Ocean</p>
          </div>
          <button class="add-btn" type="button">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>
      </div>
      <div
        class="image-accordion-item"
        data-image="https://images.pexels.com/photos/34718573/pexels-photo-34718573.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
      >
        <img
          src="https://images.pexels.com/photos/34718573/pexels-photo-34718573.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
          alt="Lauterbrunnen, Switzerland"
        />
        <div class="content">
          <div>
            <h2>Lauterbrunnen</h2>
            <p>Switzerland</p>
          </div>
          <button class="add-btn" type="button">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>
      </div>
      <div
        class="image-accordion-item"
        data-image="https://images.pexels.com/photos/31117323/pexels-photo-31117323.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
      >
        <img
          src="https://images.pexels.com/photos/31117323/pexels-photo-31117323.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
          alt="Cinque Terre, Italy"
        />
        <div class="content">
          <div>
            <h2>Cinque Terre</h2>
            <p>Italy</p>
          </div>
          <button class="add-btn" type="button">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>
      </div>
      <div
        class="image-accordion-item"
        data-image="https://images.pexels.com/photos/37549251/pexels-photo-37549251.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
      >
        <img
          src="https://images.pexels.com/photos/37549251/pexels-photo-37549251.jpeg?auto=compress&cs=tinysrgb&w=1200&h=1200&fit=crop"
          alt="Bali, Indonesia"
        />
        <div class="content">
          <div>
            <h2>Bali</h2>
            <p>Indonesia</p>
          </div>
          <button class="add-btn" type="button">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
