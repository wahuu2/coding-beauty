<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidebars</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,1,0"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/akar-icons-fonts"></script>
  </head>
  <body>
    <aside class="sidebar">
      <div class="handle"></div>
      <div class="sidebar-inner">
        <header>
          <img class="logo-icon" src="logo-icon.svg" />
          <img class="logo-text" src="logo-text.svg" />
        </header>
        <ul>
          <li>
            <button type="button" onclick="gotoPage(this)">
              <i class="ai-dashboard"></i>
              <p>Dashboard</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="gotoPage(this)">
              <i class="ai-grid"></i>
              <p>Apps</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="openSubmenu(this)">
              <i class="ai-folder"></i>
              <p>Files</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="openSubmenu(this)">
              <i class="ai-lock-on"></i>
              <p>Accounts</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="openSubmenu(this)">
              <i class="ai-person"></i>
              <p>Users</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="openSubmenu(this)">
              <i class="ai-location"></i>
              <p>Locations</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="gotoPage(this)">
              <i class="ai-bell"></i>
              <p>Notifications</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="gotoPage(this)">
              <i class="ai-cart"></i>
              <p>Products</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="gotoPage(this)">
              <i class="ai-triangle-alert"></i>
              <p>Warnings</p>
            </button>
          </li>
          <li>
            <button type="button" onclick="gotoPage(this)">
              <i class="ai-gear"></i>
              <p>Settings</p>
            </button>
          </li>
        </ul>
      </div>
    </aside>
    <script type="text/javascript" src="main.js"></script>
  </body>
</html>
